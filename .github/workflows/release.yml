name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74

      - name: Build
        run: wails3 task build EXTRA_TAGS=webkit2_41

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: extratos-linux-amd64
          path: bin/extratos-app

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev nsis

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74

      - name: Build Windows binary
        run: wails3 task windows:build

      - name: Create NSIS installer
        run: wails3 task windows:create:nsis:installer

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: extratos-windows-amd64
          path: bin/*-installer.exe

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: extratos-windows-amd64-exe
          path: bin/extratos-app.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74

      - name: Install frontend deps
        run: cd frontend && npm install

      - name: Build universal binary
        run: wails3 task darwin:build:universal

      - name: Create .app bundle
        run: wails3 task darwin:package:universal

      - name: Create .pkg installer
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p pkg-root/Applications
          cp -R bin/extratos-app.app pkg-root/Applications/Extratos.app
          pkgbuild \
            --root pkg-root \
            --identifier "com.canesin.extratos" \
            --version "${VERSION}" \
            --install-location "/" \
            bin/extratos-macos-universal.pkg

      - name: Upload .pkg
        uses: actions/upload-artifact@v4
        with:
          name: extratos-macos-universal
          path: bin/extratos-macos-universal.pkg

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package artifacts
        run: |
          cd artifacts
          # Linux
          tar czf extratos-linux-amd64.tar.gz -C extratos-linux-amd64 .
          # Windows installer
          cp extratos-windows-amd64/*-installer.exe extratos-windows-amd64-installer.exe || cp extratos-windows-amd64-exe/extratos-app.exe extratos-windows-amd64.exe
          # macOS
          cp extratos-macos-universal/extratos-macos-universal.pkg extratos-macos-universal.pkg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/extratos-linux-amd64.tar.gz
            artifacts/extratos-windows-amd64-installer.exe
            artifacts/extratos-macos-universal.pkg
          generate_release_notes: true
